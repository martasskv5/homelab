version: '3'

services:
  phpipam-web:
    image: phpipam/phpipam-www:latest
    environment:
      - TZ=Europe/Bratislava
      - IPAM_DATABASE_HOST=phpipam-mariadb
      - IPAM_DATABASE_PASS=password
      - IPAM_DATABASE_WEBHOST=%
      - BASE=/
      - SSL=true
      - SITETITLE=https://ipam.martas.internal/
      - IPAM_TRUST_X_FORWARDED=true
      - IPAM_DISABLE_INSTALLER=1

    restart: always
    hostname: ipam.martas.internal
    volumes:
      - phpipam-logo:/phpipam/css/images/logo
      - phpipam-ca:/usr/local/share/ca-certificates:ro
    depends_on:
      - phpipam-mariadb
    networks:
      ipam:
        ipv4_address: 10.88.1.34
        ipv6_address: fd00:dead:beef:4:4::2
      proxy:
        ipv4_address: 10.88.255.3
        ipv6_address: fd00:dead:beef:4:ffff::3

  phpipam-cron:
    image: phpipam/phpipam-cron:latest
    environment:
      - TZ=Europe/Bratislava
      - IPAM_DATABASE_HOST=phpipam-mariadb
      - IPAM_DATABASE_PASS=password
      - SCAN_INTERVAL=1h
    restart: always
    volumes:
      - phpipam-ca:/usr/local/share/ca-certificates:ro
    depends_on:
      - phpipam-mariadb
    networks:
      ipam:
        ipv4_address: 10.88.1.35
        ipv6_address: fd00:dead:beef:4:4::3

  phpipam-mariadb:
    image: mariadb:latest
    environment:
      - MYSQL_ROOT_PASSWORD=password
    restart: always
    volumes:
      - phpipam-db-data:/var/lib/mysql
    networks:
      ipam:
        ipv4_address: 10.88.1.36
        ipv6_address: fd00:dead:beef:4:4::4

volumes:
  phpipam-db-data:
  phpipam-logo:
  phpipam-ca:

networks: 
  ipam:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 10.88.1.32/29
          gateway: 10.88.1.33
        - subnet: fd00:dead:beef:4:4::/80
          gateway: fd00:dead:beef:4:4::1
  proxy:
    external: true
