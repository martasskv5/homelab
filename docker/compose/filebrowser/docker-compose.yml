services:
  filebrowser:
    image: gtstef/filebrowser:stable
    volumes:
      - /opt/filebrowser/data:/default
      - /opt/filebrowser/data/erazmus:/mnt/erazmus
      - /opt/filebrowser-quantum/data:/home/filebrowser/data
    ports:
      - 8081:80  # Filebrowser listens on 8080 inside docker, but here we are exposing the host port as 80 still.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"] # port should match the internal port 8080 
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      proxy:
        ipv4_address: 10.88.255.7
        ipv6_address: fd00:dead:beef:4:ffff::7
networks:
  proxy:
    external: true